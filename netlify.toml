[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Serve Decap admin as a single-page app
[[redirects]]
  from = "/admin/*"
  to = "/admin/index.html"
  status = 200

# Astro static output uses trailing slashes
[[headers]]
  for = "/admin/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"
