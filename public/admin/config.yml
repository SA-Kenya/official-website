# Decap CMS (formerly Netlify CMS) — https://decapcms.org/docs/intro/
backend:
  name: git-gateway
  branch: main

# Uncomment for local editing: run `npm run cms:dev` then open /admin/
# local_backend: true

media_folder: public/assets/images/blog
public_folder: /assets/images/blog

site_url: https://sexaholicsanonymous.or.ke
display_url: https://sexaholicsanonymous.or.ke
logo_url: /assets/images/SA-logo.webp

slug:
  encoding: "unicode"
  clean_accents: replace
  sanitize_replacement: "-"

collections:
  - name: blog
    label: Blog
    label_singular: Post
    folder: src/content/blog
    create: true
    slug: "{{title}}"
    extension: md
    format: frontmatter
    identifier_field: title
    summary: "{{description}}"
    sortable_fields: [publishDate, title]
    fields:
      - label: Title
        name: title
        widget: string
      - label: Description
        name: description
        widget: text
        hint: "Short summary for listings and search engines"
      - label: Publish date
        name: publishDate
        widget: datetime
        date_format: true
        time_format: false
        default: "{{now}}"
      - label: Author
        name: author
        widget: string
        default: SA Kenya
      - label: Category
        name: category
        widget: select
        options:
          - SIP
          - Updates
          - Literature
          - Events
          - Meetings
      - label: Tags
        name: tags
        widget: list
        default: []
        field:
          label: Tag
          name: tag
          widget: string
      - label: Draft
        name: draft
        widget: boolean
        default: false
        hint: "Draft posts are hidden from the live site"
      - label: Featured image
        name: featuredImage
        widget: image
        required: false
        hint: "Optional hero / social preview image"
      - label: Body
        name: body
        widget: markdown
